name: Build & Deploy

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [wp-post-updated]   # triggered by WordPress webhook on publish/update
  workflow_dispatch:            # allows manual trigger from GitHub UI

permissions:
  contents: write   # required by peaceiris/actions-gh-pages to push to gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Only fetch new/updated posts from WP when triggered by a WordPress webhook.
      # On regular code pushes the existing src/content/blog/ files are used as-is.
      - name: Fetch new/updated posts from WordPress
        if: github.event_name == 'repository_dispatch' || github.event_name == 'workflow_dispatch'
        run: npx tsx scripts/fetch-wp-api.ts
        env:
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}

      - name: Build Astro site
        run: npm run build
        env:
          PUBLIC_GTM_ID: ${{ secrets.PUBLIC_GTM_ID }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: aragrow.me   # writes CNAME file so custom domain is preserved on every deploy
