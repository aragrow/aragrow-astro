<svg xmlns="http://www.w3.org/2000/svg" width="640" height="200" viewBox="0 0 640 200">
  <defs>
    <!-- Background: dark wine → deep amber-black -->
    <linearGradient id="bg" x1="0" y1="0" x2="640" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1a0505"/>
      <stop offset="100%" stop-color="#2d1a00"/>
    </linearGradient>
    <!-- Brighter logo/text for dark background -->
    <linearGradient id="textGrad" x1="265" y1="0" x2="375" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#e05050"/>
      <stop offset="100%" stop-color="#E8B931"/>
    </linearGradient>
  </defs>

  <rect width="640" height="200" fill="url(#bg)"/>

  <circle cx="60"  cy="170" r="110" fill="#e05050" opacity="0.08"/>
  <circle cx="580" cy="30"  r="90"  fill="#E8B931" opacity="0.10"/>

  <g transform="translate(265, 34) scale(1.1)">
    <polygon points="50,10 10,88 24,88"  fill="#e05050"/>
    <polygon points="50,10 76,88 90,88"  fill="#e05050"/>
    <rect x="48.5" y="57" width="3" height="13" rx="1.5" fill="#e05050"/>
    <ellipse cx="50" cy="49" rx="3.5" ry="7.5" fill="#E8B931"/>
    <ellipse cx="44" cy="57" rx="6.5" ry="3" transform="rotate(-35 44 57)" fill="#E8B931"/>
    <ellipse cx="56" cy="57" rx="6.5" ry="3" transform="rotate(35 56 57)"  fill="#E8B931"/>
  </g>

  <text
    x="320" y="168"
    font-family="'Space Grotesk', 'Segoe UI', Arial, sans-serif"
    font-size="15"
    font-weight="700"
    fill="url(#textGrad)"
    text-anchor="middle"
    letter-spacing="5"
  >AraGrow</text>
</svg>
